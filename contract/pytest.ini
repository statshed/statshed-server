[pytest]
# AIDEV-NOTE: One marker per server config profile (spec.md 8.3). runner.py starts the
# server under the profile's env, then runs `pytest -m <profile>` so only that profile's
# tests execute. Most behavior is profile-independent and marked `default`; the others
# pin behavior that needs a specially-configured server. --strict-markers makes a typo'd
# marker an error rather than a silent no-op.
markers =
    default: runs against the default server configuration
    log_disabled: requires LOG_UPLOAD_ENABLED=false
    max_log_lines: requires a small MAX_LOG_LINES (log truncation / default tail)
    max_page_size: requires a small MAX_JOBS_PAGE_SIZE (pagination clamp)
    with_spa: requires the SPA served from a known STATIC_DIR
    no_spa: requires no SPA fallback registered (root paths return 404)
addopts = --strict-markers
