# Release pipeline. Pushing a semver tag (e.g. v0.1.0) builds a multi-arch Docker
# image, pushes it to GitHub Container Registry (ghcr.io/statshed/statshed-server),
# and publishes a GitHub Release with a ready-to-run compose file so users can
# `docker compose up` without building from source.
#
#   git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

jobs:
  image:
    name: Build & push statshed-server image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/statshed/statshed-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The release ships the image-based compose under the canonical filename so
      # users can run `docker compose up` against it directly.
      - name: Stage release assets
        run: |
          mkdir -p release
          cp docker-compose.release.yml release/docker-compose.yml
          cp .env.example release/.env.example

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/docker-compose.yml
            release/.env.example
          body: |
            ## StatShed ${{ github.ref_name }}

            Multi-arch container image (`linux/amd64`, `linux/arm64`):

            - `ghcr.io/statshed/statshed-server:${{ github.ref_name }}`

            ### Run it

            Download the attached `docker-compose.yml` and `.env.example`, then:

            ```bash
            cp .env.example .env        # set SECRET_KEY (openssl rand -hex 32)
            STATSHED_VERSION=${{ github.ref_name }} docker compose up -d
            ```

            Open <http://localhost:7827>.
