# CI gate for the StatShed monorepo. Runs on every PR and on pushes to the main
# branches, failing the run on any non-zero step. Jobs: go, frontend, the hermetic
# Playwright e2e, the contract suite vs the Go server across all profiles (the
# regression gate), the non-mocked live-SSE gate, and a Go image smoke test.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go — build, vet, lint, test (race)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # go-version tracks the 1.26 floor in go.mod (C5). Module/build caching keys on
      # go.sum (added in Phase 2 when the first dependencies land); harmless until then.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # `golangci-lint run` (pinned v2) also reports the gofmt/goimports formatters
      # configured under .golangci.yml's `formatters:` as failing issues — verified
      # locally that a misformatted file makes this step exit non-zero — so this is the
      # formatting gate too; a separate `golangci-lint fmt --diff` step is NOT needed
      # (and would not gate: `fmt --diff` only prints a diff and exits 0). Pin the
      # version for reproducibility (S8); keep it in step with .golangci.yml's `version`.
      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      # -race is the high-value hardening baseline for the concurrent worker + SSE hub (C3).
      - name: Test (race)
        run: go test -race ./...

  frontend:
    name: Frontend — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # matches frontend/Dockerfile builder (node:22-alpine); undici@8 in tests needs Node >= 22.10
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

      # Fail only on known HIGH/critical vulnerabilities in runtime deps (what ships).
      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: Frontend E2E (Playwright, hermetic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # AIDEV-NOTE: This (Node 22) hermetic job uses Playwright's BUNDLED chromium, so it must
      # install it. timeout-minutes is a fail-fast guard: `playwright install` can wedge in
      # post-download browser extraction (it does so reliably under Node 24 — see the live-e2e
      # job, which sidesteps the bundled browser). DEBIAN_FRONTEND=noninteractive keeps the
      # --with-deps apt step from blocking on a prompt.
      - name: Install Playwright browser
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install --with-deps chromium

      # CI=true (set by GitHub Actions) makes Playwright start its own Vite dev
      # server and enables forbidOnly + retries. The suite is hermetic (mocked /api).
      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  contract:
    name: Contract suite (Go, all profiles)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # The Go contract suite (contracttest/, build tag `contract`) boots the real binary and
      # drives it over HTTP across every profile; any regression fails the run (impl-guide
      # Task 6.1). The frozen green-vs-Python parity baseline is the `contract-baseline` tag.
      - name: Contract suite (all profiles)
        run: |
          for p in default max_page_size max_log_lines log_disabled no_spa with_spa; do
            echo "::group::$p"; make contract-test PROFILE=$p; echo "::endgroup::"
          done

  live-e2e:
    name: Live SSE (non-mocked proxy + reconnect)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Node 24: the live spec mutates the DB while Go is down via node:sqlite, which is
      # flag-free here (Node 22 would need --experimental-sqlite).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      # AIDEV-NOTE: The live spec launches the runner's PREINSTALLED system Google Chrome via
      # PLAYWRIGHT_CHROMIUM_BIN (see playwright.live.config.ts -> launchOptions.executablePath and
      # the `live-e2e` Make target), so we deliberately do NOT run `playwright install` here.
      # Downloading the bundled chromium wedged indefinitely in post-download extraction under this
      # job's Node 24 (Playwright 1.49 predates Node 24 support); the binary was never even used.
      # Node 24 is required for unflagged `node:sqlite` in the spec, so we keep it and bring our own
      # browser. Pin PLAYWRIGHT_CHROMIUM_BIN explicitly and fail loudly if Chrome is missing, rather
      # than letting the gate silently fall back to a non-existent bundled browser.
      - name: Point the live gate at system Chrome
        run: |
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || true)"
          test -n "$CHROME" || { echo "::error::google-chrome not found on the runner"; exit 1; }
          echo "Using $CHROME ($("$CHROME" --version))"
          echo "PLAYWRIGHT_CHROMIUM_BIN=$CHROME" >> "$GITHUB_ENV"

      # Builds the Go binary, boots it (:7828) + Vite (:7827), and runs the non-mocked spec
      # through the proxy (unbuffered delivery + reconnect-driven refetch). Runs every PR
      # (C9). CI=true makes the config start its own Vite + forbid .only.
      - name: Live SSE gate
        run: make live-e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: live-e2e-report
          path: frontend/playwright-report/
          retention-days: 7

  smoke:
    name: Unified image smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t statshed-server:ci .

      - name: Run and probe
        run: |
          trap 'docker rm -f statshed-ci 2>/dev/null || true' EXIT
          docker run --rm -d --name statshed-ci -p 7827:7828 -e SECRET_KEY=ci statshed-server:ci
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:7827/api/health; then ok=1; break; fi
            sleep 2
          done
          test "${ok:-0}" = "1" || { docker logs statshed-ci; exit 1; }
          curl -fsS http://127.0.0.1:7827/ | grep -q '<title>StatShed</title>'
