# CI gate for the StatShed monorepo. Runs on every PR and on pushes to the main
# branches, failing the run on any non-zero step. Jobs: backend (legacy Python),
# go, frontend, the hermetic Playwright e2e, the contract suite vs BOTH servers
# across all profiles (the parity gate), the non-mocked live-SSE gate, and a Go
# image smoke test.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend — ruff, mypy, pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installs uv and provisions the Python version pinned in backend/.python-version.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy app.py models.py config.py background.py

      - name: Tests (pytest)
        run: uv run pytest

  go:
    name: Go — build, vet, lint, test (race)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # go-version tracks the 1.26 floor in go.mod (C5). Module/build caching keys on
      # go.sum (added in Phase 2 when the first dependencies land); harmless until then.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # `golangci-lint run` (pinned v2) also reports the gofmt/goimports formatters
      # configured under .golangci.yml's `formatters:` as failing issues — verified
      # locally that a misformatted file makes this step exit non-zero — so this is the
      # formatting gate too; a separate `golangci-lint fmt --diff` step is NOT needed
      # (and would not gate: `fmt --diff` only prints a diff and exits 0). Pin the
      # version for reproducibility (S8); keep it in step with .golangci.yml's `version`.
      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      # -race is the high-value hardening baseline for the concurrent worker + SSE hub (C3).
      - name: Test (race)
        run: go test -race ./...

  frontend:
    name: Frontend — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # matches frontend/Dockerfile builder (node:22-alpine); undici@8 in tests needs Node >= 22.10
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

      # Fail only on known HIGH/critical vulnerabilities in runtime deps (what ships).
      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: Frontend E2E (Playwright, hermetic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # CI=true (set by GitHub Actions) makes Playwright start its own Vite dev
      # server and enables forbidOnly + retries. The suite is hermetic (mocked /api).
      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  contract:
    name: Contract suite (Python + Go, all profiles)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The runner builds the Go binary itself; the Python target boots gunicorn + alembic.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python deps (backend server + contract harness)
        run: |
          (cd backend && uv sync)
          (cd contract && uv sync)

      # The same HTTP assertions run against BOTH servers across every profile; any
      # divergence fails the run (the parity gate — spec §8.1 / impl-guide Task 6.1).
      - name: Contract suite vs Python (all profiles)
        run: |
          for p in default max_page_size max_log_lines log_disabled no_spa with_spa; do
            echo "::group::python / $p"; make contract-test TARGET=python PROFILE=$p; echo "::endgroup::"
          done

      - name: Contract suite vs Go (all profiles)
        run: |
          for p in default max_page_size max_log_lines log_disabled no_spa with_spa; do
            echo "::group::go / $p"; make contract-test TARGET=go PROFILE=$p; echo "::endgroup::"
          done

  live-e2e:
    name: Live SSE (non-mocked proxy + reconnect)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Node 24: the live spec mutates the DB while Go is down via node:sqlite, which is
      # flag-free here (Node 22 would need --experimental-sqlite).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium

      # Builds the Go binary, boots it (:7828) + Vite (:7827), and runs the non-mocked spec
      # through the proxy (unbuffered delivery + reconnect-driven refetch). Runs every PR
      # (C9). CI=true makes the config start its own Vite + forbid .only.
      - name: Live SSE gate
        run: make live-e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: live-e2e-report
          path: frontend/playwright-report/
          retention-days: 7

  smoke:
    name: Unified image smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t statshed-server:ci .

      - name: Run and probe
        run: |
          trap 'docker rm -f statshed-ci 2>/dev/null || true' EXIT
          docker run --rm -d --name statshed-ci -p 7827:7828 -e SECRET_KEY=ci statshed-server:ci
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:7827/api/health; then ok=1; break; fi
            sleep 2
          done
          test "${ok:-0}" = "1" || { docker logs statshed-ci; exit 1; }
          curl -fsS http://127.0.0.1:7827/ | grep -q '<title>StatShed</title>'
