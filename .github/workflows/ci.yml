# CI gate for the StatShed monorepo. Runs on every PR and on pushes to the main
# branches, failing the run on any non-zero step. The backend and frontend are
# checked independently; the hermetic Playwright e2e suite runs as its own job.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend — ruff, mypy, pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installs uv and provisions the Python version pinned in backend/.python-version.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy app.py models.py config.py background.py

      - name: Tests (pytest)
        run: uv run pytest

  frontend:
    name: Frontend — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # matches frontend/Dockerfile builder (node:22-alpine); undici@8 in tests needs Node >= 22.10
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

      # Fail only on known HIGH/critical vulnerabilities in runtime deps (what ships).
      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: Frontend E2E (Playwright, hermetic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # CI=true (set by GitHub Actions) makes Playwright start its own Vite dev
      # server and enables forbidOnly + retries. The suite is hermetic (mocked /api).
      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  smoke:
    name: Unified image smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t statshed-server:ci .

      - name: Run and probe
        run: |
          trap 'docker rm -f statshed-ci 2>/dev/null || true' EXIT
          docker run --rm -d --name statshed-ci -p 7827:7828 -e SECRET_KEY=ci statshed-server:ci
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:7827/api/health; then ok=1; break; fi
            sleep 2
          done
          test "${ok:-0}" = "1" || { docker logs statshed-ci; exit 1; }
          curl -fsS http://127.0.0.1:7827/ | grep -q '<title>StatShed</title>'
