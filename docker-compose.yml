# StatShed — full stack from source, as a single Go image.
#
#   cp .env.example .env        # then customize as needed
#   docker compose up --build -d
#   open http://localhost:7827
#
# One container serves the React SPA, the REST API, and the SSE stream (/api/events).
# CLI clients POST job status to the same origin under /api (e.g. /api/status).

services:
  statshed:
    build: .
    image: statshed-server:local
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/statshed.db}
      - SECRET_KEY=${SECRET_KEY:-}
      - DEBUG=${DEBUG:-false}
    ports:
      # Browser dashboard AND CLI status POSTs both use this single port.
      - "${STATSHED_PORT:-7827}:7828"
    volumes:
      - statshed-data:/data
    restart: unless-stopped
    healthcheck:
      # The distroless image has no curl/shell — the binary probes /api/health itself
      # (on the loopback, 127.0.0.1, matching its IPv4 bind).
      test: ["CMD", "/statshed-server", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  statshed-data:
