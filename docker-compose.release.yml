# StatShed — single prebuilt image (no local build).
#
#   cp .env.example .env                                                   # customize as needed
#   STATSHED_VERSION=v0.1.0 docker compose -f docker-compose.release.yml up -d
#   open http://localhost:7827

services:
  statshed:
    image: ghcr.io/statshed/statshed-server:${STATSHED_VERSION:-latest}
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/statshed.db}
      - SECRET_KEY=${SECRET_KEY:-}
      - DEBUG=${DEBUG:-false}
    ports:
      - "${STATSHED_PORT:-7827}:7828"
    volumes:
      - statshed-data:/data
    restart: unless-stopped
    healthcheck:
      # The distroless image has no curl/shell — the binary probes /api/health itself.
      test: ["CMD", "/statshed-server", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  statshed-data:
